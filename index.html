// ── Foto de perfil: recorta a cuadrado, redimensiona y comprime a dataURL ──
// (se guarda dentro del doc del profesional en Firestore; ~30-60 KB, sin Storage)
function avatarFromFile(file, max = 320, quality = 0.82) {
  return new Promise((resolve, reject) => {
    if (!file || !file.type.startsWith('image/')) return reject(new Error('El archivo tiene que ser una imagen (JPG o PNG).'));
    if (file.size > 12 * 1024 * 1024) return reject(new Error('La imagen es muy grande (máx 12 MB).'));
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('No se pudo leer el archivo.'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('No se pudo procesar la imagen.'));
      img.onload = () => {
        const srcSide = Math.min(img.width, img.height);          // recorte cuadrado centrado
        const side = Math.min(max, srcSide);
        const sx = (img.width - srcSide) / 2, sy = (img.height - srcSide) / 2;
        const canvas = document.createElement('canvas');
        canvas.width = side; canvas.height = side;
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, sx, sy, srcSide, srcSide, 0, 0, side, side);
        resolve(canvas.toDataURL('image/jpeg', quality));
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}
// Devuelve la foto del profesional o, si no tiene, la inicial sobre un cuadro de marca.

}
// DNI: mantiene proporción, redimensiona a ~1100px y comprime bajando calidad hasta entrar en el tope.
function idImageFromFile(file, maxSide = 1100, budgetBytes = 300000) {
  return new Promise((resolve, reject) => {
    if (!file || !file.type.startsWith('image/')) return reject(new Error('El archivo tiene que ser una imagen (JPG o PNG).'));
    if (file.size > 20 * 1024 * 1024) return reject(new Error('La imagen es muy grande (máx 20 MB).'));
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('No se pudo leer el archivo.'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('No se pudo procesar la imagen.'));
      img.onload = () => {
        const scale = Math.min(1, maxSide / Math.max(img.width, img.height));
        const w = Math.round(img.width * scale), h = Math.round(img.height * scale);
        const canvas = document.createElement('canvas');
        canvas.width = w; canvas.height = h;
        const ctx = canvas.getContext('2d');
        ctx.imageSmoothingQuality = 'high';
        ctx.drawImage(img, 0, 0, w, h);
        let q = 0.72, url = canvas.toDataURL('image/jpeg', q);
        while (url.length * 0.75 > budgetBytes && q > 0.4) { q -= 0.1; url = canvas.toDataURL('image/jpeg', q); }
        resolve(url);
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

async function computeAdminAlerts() {
  if (state.profile?.role !== 'admin' || !state.user) { state.alerts = { pros:0, jobs:0 }; return; }
  const key = 'manosya_seen_jobs_' + state.user.uid;
  let seen = +(localStorage.getItem(key) || 0);
  if (!seen) { seen = Date.now(); localStorage.setItem(key, seen); }
  try {
    const prosAgg = await getCountFromServer(query(collection(db,'professionals'), where('status','==','pendiente')));
    const jobsAgg = await getCountFromServer(query(collection(db,'jobs'), where('createdAt','>', Timestamp.fromMillis(seen))));
    state.alerts = { pros: prosAgg.data().count, jobs: jobsAgg.data().count };
  } catch (e) { state.alerts = { pros:0, jobs:0 }; }
}

  if (!state.user) return;

// Acceso con Google. Si la cuenta es nueva, la da de alta con el rol elegido
// (cliente por defecto). Si ya existe, simplemente ingresa con su rol guardado.
async function signInGoogle(desiredRole) {
  const err = $('autherr'); if (err) err.hidden = true;
  const btn = $('gbtn'); if (btn) { btn.disabled = true; btn.style.opacity = '.6'; }
  try {
    const provider = new GoogleAuthProvider();
    provider.setCustomParameters({ prompt: 'select_account' });
    const { user } = await signInWithPopup(auth, provider);
    const uref = doc(db,'users',user.uid);
    const snap = await getDoc(uref);
    if (!snap.exists()) {
      const role = desiredRole === 'profesional' ? 'profesional' : 'cliente';
      const name = user.displayName || '';
      await setDoc(uref, { role, fullName:name, email:user.email||'', createdAt: serverTimestamp() });
      if (role === 'profesional') await provisionProfessional(user.uid, name);
      state.profile = { role, fullName:name, email:user.email||'' };
    } else {
      state.profile = snap.data();
    }
    await loadSettings(); await computeAdminAlerts(); navActions();
    const target = state.profile.role === 'profesional' ? '#/feed'
      : state.profile.role === 'admin' ? '#/admin' : '#/';
    if (location.hash !== target) location.hash = target; else router();
  } catch (ex) {
    if (ex.code === 'auth/cancelled-popup-request') return;   // doble click: ignorar
    if (err) { err.textContent = traducirError(ex.code); err.hidden = false; }
  } finally {
    const b = $('gbtn'); if (b) { b.disabled = false; b.style.opacity = ''; }
  }
}
function traducirError(code){
  return ({
    'auth/invalid-credential':'Email o contraseña incorrectos.',
    'auth/email-already-in-use':'Ese email ya está registrado.',
    'auth/weak-password':'La contraseña es muy corta.',
    'auth/invalid-email':'Email inválido.',
    'auth/popup-closed-by-user':'Cerraste la ventana de Google antes de terminar.',
    'auth/popup-blocked':'El navegador bloqueó la ventana emergente. Permitila e intentá de nuevo.',
    'auth/account-exists-with-different-credential':'Ya existe una cuenta con ese email creada con otro método. Ingresá con email y contraseña.',
    'auth/unauthorized-domain':'Este dominio no está habilitado en Firebase (Authentication → Settings → Authorized domains).',
  })[code] || 'No se pudo completar. Probá de nuevo.';
}

async function doUnlock(jobId, cost) {
  const u = state.user.uid;
  try {
    const out = await runTransaction(db, async (tx) => {
      const jobRef = doc(db,'jobs',jobId), wRef = doc(db,'wallets',u), unRef = doc(db,'jobs',jobId,'unlocks',u);
      const jS = await tx.get(jobRef), wS = await tx.get(wRef), unS = await tx.get(unRef);
      if (!jS.exists()) throw new Error('La solicitud no existe.');
      if (unS.exists()) return { already:true, balance: wS.exists()?wS.data().balance:0 };
      const job = jS.data();
      if (job.status !== 'abierta') throw new Error('La solicitud no está abierta.');
      if ((job.unlocksCount||0) >= (job.maxUnlocks||DEFAULTS.maxUnlocks)) throw new Error('Ya alcanzó el máximo de profesionales.');
      const bal = wS.exists() ? (wS.data().balance||0) : 0;
      if (bal < job.creditCost) throw new Error('INSUFICIENTE');
      const newBal = bal - job.creditCost;
      tx.update(wRef, { balance: newBal, lifetimeSpent: (wS.data().lifetimeSpent||0)+job.creditCost });
      tx.set(unRef, { creditsSpent: job.creditCost, at: serverTimestamp() });
      tx.update(jobRef, { unlocksCount: increment(1) });
      return { already:false, balance:newBal, cost:job.creditCost };
    });
    // ledger fuera de la transacción (la transacción ya garantizó el descuento)
    if (!out.already) {
      await addDoc(collection(db,'wallets',u,'ledger'), {
        type:'consumo', amount:-out.cost, balanceAfter:out.balance, jobId, note:'Desbloqueo de solicitud', at: serverTimestamp() });
    }
    return { ok:true, balance: out.balance };
  } catch (ex) {
    return { ok:false, error: ex.message==='INSUFICIENTE' ? 'Créditos insuficientes.' : ('No se pudo desbloquear: '+ex.message) };
  }
}

async function showContact(jobId, slot) {
  slot.innerHTML = `<div class="rounded-xl bg-accent/10 p-4 text-sm"><p class="font-semibold text-accent">Contacto desbloqueado</p><p class="mt-1 text-muted">Cargando…</p></div>`;
  try {
    const c = (await getDoc(doc(db,'jobs',jobId,'contact','data'))).data() || {};
    const rows = [];
    if (c.phone) rows.push(`📞 ${esc(c.phone)}`);
    if (c.whatsapp) rows.push(`💬 <a class="text-brand underline" target="_blank" href="https://wa.me/${esc(c.whatsapp.replace(/\D/g,''))}">${esc(c.whatsapp)}</a>`);
    if (c.email) rows.push(`✉️ ${esc(c.email)}`);

async function adminAdjust(proId, amount) {
  const wRef = doc(db,'wallets',proId);
  await runTransaction(db, async (tx) => {
    const wS = await tx.get(wRef);
    const cur = wS.exists() ? (wS.data().balance ?? 0) : 0;
    const newBal = Math.max(0, cur + amount);
    if (wS.exists()) tx.update(wRef, { balance:newBal, lifetimePurchased:(wS.data().lifetimePurchased||0)+(amount>0?amount:0) });
    else tx.set(wRef, { balance:newBal, lifetimePurchased:Math.max(0,amount), lifetimeSpent:0 });
    const lRef = doc(collection(db,'wallets',proId,'ledger'));
    tx.set(lRef, { type: amount>0?'compra':'reembolso', amount, balanceAfter:newBal, note:'Carga manual (admin)', at: serverTimestamp() });
  });
}

      const btn = $('id-submit'); btn.disabled=true; btn.textContent='Enviando…';
      try {
        await setDoc(idRef, { dniFrente:idFrente, dniDorso:idDorso, dniNumero:$('id-num').value.trim(), submittedAt: serverTimestamp() }, { merge:true });
        await setDoc(ref, { idStatus:'pendiente', idRejectReason:'' }, { merge:true });
        renderIdSent();
      } catch (ex) { idMsg.textContent='No se pudo enviar: '+ex.message; idMsg.style.color='#b91c1c'; idMsg.hidden=false; btn.disabled=false; btn.textContent='Enviar para verificación'; }
    };
  }
  function renderIdSent() {
    $('id-body').innerHTML = `<div class="rounded-xl bg-surface p-4 text-sm">
      <p class="font-semibold text-navy">📨 Documento enviado</p>
      <p class="mt-1 text-muted">Está en revisión. Te aparecerá el sello <b>🪪 Identidad verificada</b> cuando el equipo lo apruebe.</p>
      <button id="id-redo" class="btn btn-ghost mt-3">Volver a enviar las fotos</button></div>`;
    $('id-redo').onclick = () => renderIdForm();
  }

  if (idStatus === 'verificado') {
    $('id-body').innerHTML = `<div class="rounded-xl bg-accent/10 p-4 text-sm">
      <p class="font-semibold text-accent">✓ Tu identidad está verificada</p>
      <p class="mt-1 text-muted">Los clientes ven el sello <b>🪪 Identidad verificada</b> en tu perfil. Esto les da seguridad sobre quién va a ir a su casa.</p></div>`;
  } else if (idStatus === 'pendiente') {
    renderIdSent();
  } else if (idStatus === 'rechazado') {
    renderIdForm(`<div class="mb-3 rounded-xl border border-red-200 bg-red-50 p-3 text-sm text-red-700">
      Tu verificación fue rechazada${p.idRejectReason?`: <b>${esc(p.idRejectReason)}</b>`:''}. Revisá las fotos y volvé a enviarlas.</div>`);
  } else {
    renderIdForm();
  }

  $('pf').onsubmit = async (e) => {
    e.preventDefault();
    const cats = [...document.querySelectorAll('.catck:checked')].map(c=>c.value);
    try {
      await setDoc(ref, { headline:$('p_head').value.trim(), city:$('p_city').value.trim(),
        whatsapp:$('p_wa').value.trim(), bio:$('p_bio').value.trim(), categories:cats, photo:photoData }, { merge:true });
      const m=$('pf-msg'); m.textContent='✅ Perfil guardado.'; m.hidden=false;
    } catch (ex) { const m=$('pf-msg'); m.style.color='#b91c1c'; m.textContent='No se pudo guardar: '+ex.message; m.hidden=false; }
  };
}

// ── POOL DE PROFESIONALES (lo ve el cliente) ─────────────────────────────
async function renderPool() {
  $('app').innerHTML = `<div class="mx-auto max-w-5xl px-4 py-8">
    <h1 class="text-2xl font-extrabold text-navy">Profesionales</h1>
    <p class="mt-1 text-muted">Mirá quiénes están inscriptos y publicá tu solicitud para que te contacten.</p>
    <div class="card mt-5 grid gap-3 p-4 sm:grid-cols-3">
      <div><label class="label">Servicio</label><select id="pl_cat" class="input"><option value="">Todos</option>${catOptions()}</select></div>
      <div><label class="label">Zona</label><input id="pl_city" class="input" placeholder="Ej: Floresta"></div>
      <div class="flex items-end"><button id="pl_btn" class="btn btn-primary grad w-full">Filtrar</button></div>
    </div>
    <p id="pl-load" class="mt-5 text-muted">Cargando…</p>
    <div id="pl-list" class="mt-5 grid gap-4 sm:grid-cols-2 lg:grid-cols-3"></div></div>`;

  const snap = await getDocs(query(collection(db,'professionals'), where('status','==','aprobado')));
  const all = snap.docs.map(d=>({id:d.id,...d.data()}));
  const draw = () => {
    const fc = $('pl_cat').value, fcity = $('pl_city').value.trim().toLowerCase();
    const list = all.filter(p =>
      (!fc || (p.categories||[]).includes(fc)) &&
      (!fcity || (p.city||'').toLowerCase().includes(fcity)));
    $('pl-list').innerHTML = list.length ? list.map(p => `<div class="card p-5">
        <div class="flex items-center gap-3">
          ${proAvatar(p)}
          <div><p class="font-bold text-navy">${esc(p.fullName||'Profesional')}</p>
            <p class="text-xs font-semibold text-accent">✓ Verificado</p></div>
        </div>
        ${p.idStatus==='verificado' ? `<p class="mt-2 inline-flex items-center gap-1 rounded-lg bg-accent/10 px-2 py-1 text-xs font-semibold text-accent">🪪 Identidad verificada</p>` : ''}
        <p class="mt-2 text-sm text-muted">${esc(p.headline||'Profesional')}</p>
        <div class="mt-2 flex flex-wrap gap-1.5">${(p.categories||[]).slice(0,4).map(c=>`<span class="chip">${catName(c)}</span>`).join('')}</div>
        <p class="mt-2 text-xs text-muted">📍 ${esc(p.city||'—')}</p>
        <a href="#/publicar" class="btn btn-soft mt-3 w-full">Publicar solicitud</a>
      </div>`).join('') : `<div class="card p-8 text-center text-muted sm:col-span-2 lg:col-span-3">No hay profesionales que coincidan con el filtro todavía.</div>`;
  };
  $('pl-load')?.remove(); draw();
  $('pl_btn').onclick = draw;
}

// ── Auth state ───────────────────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  state.user = user;
  await loadCategories();
  if (user) {
    const p = await getDoc(doc(db,'users',user.uid));
    state.profile = p.exists() ? p.data() : { role:'cliente' };
    await loadSettings();
    await computeAdminAlerts();
  } else { state.profile = null; state.alerts = { pros:0, jobs:0 }; }
  navActions();
  let redirected = false;
  if (user && (['#/login','#/registro','#/',''].includes(location.hash) || !location.hash)) {
    const target = state.profile.role === 'profesional' ? '#/feed'
      : state.profile.role === 'admin' ? '#/admin' : '#/';
    if (location.hash !== target) { location.hash = target; redirected = true; } // hashchange dispara router
  }
  if (!redirected) router();
});
</script>
